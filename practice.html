        let recognition = null;
        let isRecording = false;
        let speechSynthesis = window.speechSynthesis;

        function startInterview() {
            const urlParams = new URLSearchParams(window.location.search);
            const type = urlParams.get('type') || 'frontend';
            
            // Hide instructions and show interview interface
            document.getElementById('instructionsContent').style.display = 'none';
            document.getElementById('interviewInterface').classList.remove('hidden');
            
            // Start the interview session
            currentType = type;
            currentQuestions = questionBank[type] || questionBank.frontend;
            currentQuestionIndex = 0;
            answers = [];
            
            // Log interview start
            window.activityManager.logInterviewStart(type, currentQuestions.length);
            
            // Show countdown and end button
            document.getElementById('countdown').classList.remove('hidden');
            document.getElementById('endPractice').classList.remove('hidden');
            
            // Start countdown
            startCountdown();
            
            // Initialize speech recognition
            initSpeechRecognition();
            
            // Initialize camera
            initCamera();
            
            // Initialize and show first question
            initQuestionTracker();
            showQuestion();
            
            // Enable interview mode restrictions
            enableInterviewMode();
        }

        function initSpeechRecognition() {
            if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
                recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
                recognition.continuous = true;
                recognition.interimResults = true;
                recognition.lang = 'en-US';
                
                recognition.onresult = function(event) {
                    if (!submittedAnswers.has(currentQuestionIndex)) {
                        let finalTranscript = '';
                        for (let i = event.resultIndex; i < event.results.length; i++) {
                            if (event.results[i].isFinal) {
                                finalTranscript += event.results[i][0].transcript;
                            }
                        }
                        if (finalTranscript) {
                            document.getElementById('answerText').value += finalTranscript + ' ';
                            answers[currentQuestionIndex] = document.getElementById('answerText').value;
                            updateQuestionTracker();
                        }
                    }
                };
                
                recognition.onerror = function(event) {
                    console.error('Speech recognition error:', event.error);
                };
            }
        }

        function initQuestionTracker() {
            const tracker = document.getElementById('questionTracker');
            tracker.innerHTML = '';
            
            currentQuestions.forEach((question, index) => {
                const item = document.createElement('div');
                item.className = `question-tracker-item p-3 rounded-lg border cursor-pointer transition-all duration-200 ${
                    index === currentQuestionIndex ? 'bg-primary/10 border-primary' : 'bg-gray-50 dark:bg-gray-700 border-gray-200 dark:border-gray-600 hover:bg-gray-100 dark:hover:bg-gray-600'
                }`;
                item.onclick = () => navigateToQuestion(index);
                
                const status = answers[index] ? 'answered' : 'unanswered';
                const statusIcon = answers[index] ? '✅' : '⭕';
                
                item.innerHTML = `
                    <div class="flex items-start justify-between mb-2">
                        <span class="text-sm font-medium text-gray-900 dark:text-white">Q${index + 1}</span>
                        <span class="text-lg">${statusIcon}</span>
                    </div>
                    <p class="text-xs text-gray-600 dark:text-gray-300 line-clamp-2 mb-2">${question.question}</p>
                    ${answers[index] ? `
                        <div class="bg-gray-100 dark:bg-gray-600 rounded p-2 mb-2">
                            <p class="text-xs text-gray-700 dark:text-gray-300 line-clamp-3">${answers[index]}</p>
                        </div>
                    ` : ''}
                    <div class="mt-2 flex items-center justify-between">
                        <span class="text-xs px-2 py-1 rounded ${
                            question.difficulty === 'Easy' ? 'bg-green-100 text-green-700' :
                            question.difficulty === 'Medium' ? 'bg-yellow-100 text-yellow-700' :
                            'bg-red-100 text-red-700'
                        }">${question.difficulty}</span>
                        <span class="text-xs text-gray-500">${answers[index] ? `${answers[index].length} chars` : 'No answer'}</span>
                    </div>
                `;
                
                tracker.appendChild(item);
            });
        }
        
        function updateQuestionTracker() {
            const items = document.querySelectorAll('.question-tracker-item');
            items.forEach((item, index) => {
                const isActive = index === currentQuestionIndex;
                const hasAnswer = answers[index];
                
                item.className = `question-tracker-item p-3 rounded-lg border cursor-pointer transition-all duration-200 ${
                    isActive ? 'bg-primary/10 border-primary' : 'bg-gray-50 dark:bg-gray-700 border-gray-200 dark:border-gray-600 hover:bg-gray-100 dark:hover:bg-gray-600'
                }`;
                
                const statusIcon = item.querySelector('.text-lg');
                statusIcon.textContent = hasAnswer ? '✅' : '⭕';
                
                const charCount = item.querySelector('.text-xs.text-gray-500');
                charCount.textContent = hasAnswer ? `${answers[index].length} chars` : 'No answer';
                
                // Update answer display
                const existingAnswer = item.querySelector('.bg-gray-100, .bg-gray-600');
                if (existingAnswer) existingAnswer.remove();
                
                if (hasAnswer) {
                    const answerDiv = document.createElement('div');
                    answerDiv.className = 'bg-gray-100 dark:bg-gray-600 rounded p-2 mb-2';
                    answerDiv.innerHTML = `<p class="text-xs text-gray-700 dark:text-gray-300 line-clamp-3">${answers[index]}</p>`;
                    item.insertBefore(answerDiv, item.lastElementChild);
                }
            });
        }
        
        function navigateToQuestion(index) {
            // Only allow navigation to view previous questions, not edit
            if (index >= 0 && index < currentQuestions.length && submittedAnswers.has(index)) {
                currentQuestionIndex = index;
                showQuestion();
                updateQuestionTracker();
            }
        }

        function showQuestion() {
            const question = currentQuestions[currentQuestionIndex];
            window.questionStartTime = Date.now();
            
            document.getElementById('questionNumber').textContent = currentQuestionIndex + 1;
            document.getElementById('currentQuestion').textContent = question.question;
            document.getElementById('questionDifficulty').textContent = question.difficulty;
            document.getElementById('questionDifficulty').className = `px-3 py-1 rounded-full text-sm font-medium ${
                question.difficulty === 'Easy' ? 'bg-green-100 text-green-800' :
                question.difficulty === 'Medium' ? 'bg-yellow-100 text-yellow-800' :
                'bg-red-100 text-red-800'
            }`;
            
            const tipsList = document.getElementById('questionTips');
            tipsList.innerHTML = '';
            question.tips.forEach(tip => {
                const li = document.createElement('li');
                li.textContent = '• ' + tip;
                tipsList.appendChild(li);
            });
            
            document.getElementById('progressBar').style.width = `${((currentQuestionIndex + 1) / currentQuestions.length) * 100}%`;
            document.getElementById('nextQuestion').textContent = currentQuestionIndex === currentQuestions.length - 1 ? 'Finish' : 'Next →';
            
            const answerText = document.getElementById('answerText');
            answerText.value = answers[currentQuestionIndex] || '';
            
            // Make answer read-only if already submitted
            const isSubmitted = submittedAnswers.has(currentQuestionIndex);
            answerText.readOnly = isSubmitted;
            answerText.className = `w-full h-32 p-4 border rounded-lg resize-none ${
                isSubmitted ? 
                'border-green-300 bg-green-50 dark:bg-green-900/20 text-gray-700 dark:text-gray-300' :
                'border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-900 dark:text-white'
            }`;
            
            // Disable recording if submitted
            document.getElementById('startRecording').disabled = isSubmitted;
            document.getElementById('startRecording').className = `${isSubmitted ? 'opacity-50 cursor-not-allowed' : ''} bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg text-sm font-medium flex items-center space-x-2`;
            
            // Auto-speak question
            speakText(question.question);
        }

        function speakText(text) {
            if (speechSynthesis) {
                speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.rate = 0.8;
                utterance.pitch = 1;
                speechSynthesis.speak(utterance);
            }
        }

        function startCountdown() {
            updateCountdownDisplay();
            countdownInterval = setInterval(() => {
                countdownTime--;
                updateCountdownDisplay();
                
                if (countdownTime <= 0) {
                    clearInterval(countdownInterval);
                    timeUp();
                }
            }, 1000);
        }
        
        function updateCountdownDisplay() {
            const minutes = Math.floor(countdownTime / 60);
            const seconds = countdownTime % 60;
            const display = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            
            const countdownEl = document.getElementById('countdown');
            countdownEl.textContent = display;
            
            // Change color as time runs out
            if (countdownTime <= 300) { // Last 5 minutes
                countdownEl.className = 'bg-gradient-to-r from-red-600/30 to-red-700/30 text-red-700 border border-red-500 px-4 py-2 rounded-full text-lg font-mono font-bold animate-pulse';
            } else if (countdownTime <= 600) { // Last 10 minutes
                countdownEl.className = 'bg-gradient-to-r from-orange-500/20 to-red-500/20 text-orange-600 border border-orange-400 px-4 py-2 rounded-full text-lg font-mono font-bold';
            }
        }
        
        function timeUp() {
            alert('Time\'s up! Your interview session has ended.');
            finishInterview();
        }

        let cameraStream = null;
        let cameraActive = false;

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                const video = document.getElementById('cameraPreview');
                video.srcObject = stream;
                cameraStream = stream;
                cameraActive = true;
                
                document.getElementById('cameraStatus').classList.remove('hidden');
                document.getElementById('cameraError').classList.add('hidden');
                
                window.activityManager.addActivity('camera_start', 'Camera preview activated for interview monitoring');
            } catch (error) {
                console.error('Camera access denied:', error);
                document.getElementById('cameraError').classList.remove('hidden');
                document.getElementById('cameraStatus').classList.add('hidden');
            }
        }

        function toggleCamera() {
            if (cameraActive && cameraStream) {
                cameraStream.getTracks().forEach(track => track.stop());
                document.getElementById('cameraPreview').srcObject = null;
                document.getElementById('cameraStatus').classList.add('hidden');
                cameraActive = false;
            } else {
                initCamera();
            }
        }

        function stopCamera() {
            if (cameraStream) {
                cameraStream.getTracks().forEach(track => track.stop());
                document.getElementById('cameraPreview').srcObject = null;
                document.getElementById('cameraStatus').classList.add('hidden');
                cameraActive = false;
            }
        }

        // Event listeners
        document.addEventListener('DOMContentLoaded', () => {
            loadInstructions();
            
            document.getElementById('toggleCamera')?.addEventListener('click', toggleCamera);
            
            document.getElementById('endPractice')?.addEventListener('click', () => {
                if (confirm('Are you sure you want to end the interview? Your progress will be saved.')) {
                    finishInterview();
                }
            });
            
            document.getElementById('speakQuestion')?.addEventListener('click', () => {
                const question = currentQuestions[currentQuestionIndex];
                speakText(question.question);
            });
            
            document.getElementById('startRecording')?.addEventListener('click', () => {
                if (recognition && !isRecording && !submittedAnswers.has(currentQuestionIndex)) {
                    recognition.start();
                    isRecording = true;
                    document.getElementById('startRecording').classList.add('hidden');
                    document.getElementById('stopRecording').classList.remove('hidden');
                    document.getElementById('recordingStatus').classList.remove('hidden');
                }
            });
            
            document.getElementById('stopRecording')?.addEventListener('click', () => {
                if (recognition && isRecording) {
                    recognition.stop();
                    isRecording = false;
                    document.getElementById('startRecording').classList.remove('hidden');
                    document.getElementById('stopRecording').classList.add('hidden');
                    document.getElementById('recordingStatus').classList.add('hidden');
                }
            });
            
            document.getElementById('nextQuestion')?.addEventListener('click', () => {
                const answerValue = document.getElementById('answerText').value.trim();
                if (answerValue && !submittedAnswers.has(currentQuestionIndex)) {
                    answers[currentQuestionIndex] = answerValue;
                    submittedAnswers.add(currentQuestionIndex);
                    
                    // Log question answer
                    const timeSpent = Math.floor((Date.now() - (window.questionStartTime || Date.now())) / 1000);
                    window.activityManager.logQuestionAnswer(
                        currentQuestionIndex + 1, 
                        true, 
                        timeSpent
                    );
                }
                
                if (currentQuestionIndex < currentQuestions.length - 1) {
                    currentQuestionIndex++;
                    window.questionStartTime = Date.now();
                    showQuestion();
                    updateQuestionTracker();
                } else {
                    finishInterview();
                }
            });
            
            // Update tracker when user types (only if not submitted)
            document.getElementById('answerText')?.addEventListener('input', () => {
                if (!submittedAnswers.has(currentQuestionIndex)) {
                    answers[currentQuestionIndex] = document.getElementById('answerText').value;
                    updateQuestionTracker();
                }
            });
        });

        function enableInterviewMode() {
            interviewActive = true;
            
            // Request fullscreen
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            }
            
            // Prevent tab switching
            document.addEventListener('visibilitychange', handleVisibilityChange);
            
            // Prevent closing tab
            window.addEventListener('beforeunload', handleBeforeUnload);
            
            // Monitor fullscreen changes
            document.addEventListener('fullscreenchange', handleFullscreenChange);
            
            // Disable common shortcuts
            document.addEventListener('keydown', handleKeyDown);
        }
        
        function handleVisibilityChange() {
            if (interviewActive && document.hidden) {
                violationCount++;
                window.activityManager.logViolation('tab_switch', 'Tab switching detected');
                if (violationCount >= maxViolations) {
                    terminateInterview('Multiple tab switching violations detected.');
                } else {
                    alert(`Warning ${violationCount}/${maxViolations}: Tab switching is not allowed! One more violation will end the interview.`);
                    window.focus();
                }
            }
        }
        
        function handleBeforeUnload(e) {
            if (interviewActive) {
                terminateInterview('Attempted to close or refresh the page.');
            }
        }
        
        function handleFullscreenChange() {
            if (interviewActive && !document.fullscreenElement) {
                violationCount++;
                window.activityManager.logViolation('fullscreen_exit', 'Exited fullscreen mode');
                if (violationCount >= maxViolations) {
                    terminateInterview('Exited fullscreen mode.');
                } else {
                    alert(`Warning ${violationCount}/${maxViolations}: Fullscreen mode is required during interview!`);
                    if (document.documentElement.requestFullscreen) {
                        document.documentElement.requestFullscreen();
                    }
                }
            }
        }
        
        function handleKeyDown(e) {
            if (interviewActive) {
                // Prevent Alt+Tab, Ctrl+Tab, Cmd+Tab
                if ((e.altKey && e.key === 'Tab') || 
                    (e.ctrlKey && e.key === 'Tab') || 
                    (e.metaKey && e.key === 'Tab')) {
                    e.preventDefault();
                    violationCount++;
                    window.activityManager.logViolation('keyboard_shortcut', 'Attempted tab switching with keyboard');
                    if (violationCount >= maxViolations) {
                        terminateInterview('Attempted tab switching using keyboard shortcuts.');
                    } else {
                        alert(`Warning ${violationCount}/${maxViolations}: Tab switching is disabled! One more violation will end the interview.`);
                    }
                }
                
                // Prevent F11 (fullscreen toggle)
                if (e.key === 'F11') {
                    e.preventDefault();
                    violationCount++;
                    if (violationCount >= maxViolations) {
                        terminateInterview('Attempted to exit fullscreen mode.');
                    } else {
                        alert(`Warning ${violationCount}/${maxViolations}: Fullscreen mode cannot be disabled during interview!`);
                    }
                }
                
                // Prevent Ctrl+W, Ctrl+T, Cmd+W, Cmd+T
                if ((e.ctrlKey || e.metaKey) && (e.key === 'w' || e.key === 't')) {
                    e.preventDefault();
                    violationCount++;
                    if (violationCount >= maxViolations) {
                        terminateInterview('Attempted to close/open tabs during interview.');
                    } else {
                        alert(`Warning ${violationCount}/${maxViolations}: This action is disabled during the interview!`);
                    }
                }
            }
        }
        
        function disableInterviewMode() {
            interviewActive = false;
            
            // Remove event listeners
            document.removeEventListener('visibilitychange', handleVisibilityChange);
            window.removeEventListener('beforeunload', handleBeforeUnload);
            document.removeEventListener('keydown', handleKeyDown);
            document.removeEventListener('fullscreenchange', handleFullscreenChange);
            
            // Exit fullscreen
            if (document.exitFullscreen) {
                document.exitFullscreen();
            }
        }
        
        function terminateInterview(reason) {
            disableInterviewMode();
            
            if (countdownInterval) {
                clearInterval(countdownInterval);
            }
            
            alert(`Interview terminated due to integrity violation: ${reason}\n\nYour interview has been automatically submitted.`);
            window.location.href = 'user.html';
        }
        
        function finishInterview() {
            disableInterviewMode();
            stopCamera();
            
            if (countdownInterval) {
                clearInterval(countdownInterval);
            }
            
            // Calculate score and duration
            const answeredQuestions = submittedAnswers.size;
            const score = Math.floor((answeredQuestions / currentQuestions.length) * 100);
            const duration = Math.floor((30 * 60 - countdownTime) / 60);
            
            // Log interview completion
            window.activityManager.logInterviewEnd(currentType, score, `${duration}m`);
            
            alert('Interview completed! Thank you for practicing.');
            window.location.href = 'user.html';
        }








    </script>
