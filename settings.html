<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - AI Interview Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#00d4ff',
                        secondary: '#7c3aed',
                        accent: '#10b981',
                        tech: '#1e293b',
                        cyber: '#0ea5e9'
                    },
                    fontFamily: {
                        'mono': ['JetBrains Mono', 'Fira Code', 'Consolas', 'monospace']
                    },
                    animation: {
                        'glow': 'glow 2s ease-in-out infinite alternate'
                    },
                    keyframes: {
                        glow: {
                            '0%': { boxShadow: '0 0 5px #00d4ff' },
                            '100%': { boxShadow: '0 0 20px #00d4ff, 0 0 30px #00d4ff' }
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap');
        .tech-grid { background-image: radial-gradient(circle at 1px 1px, rgba(0,212,255,0.15) 1px, transparent 0); background-size: 20px 20px; }
        .matrix-text { font-family: 'JetBrains Mono', monospace; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 tech-grid matrix-text">
    <div class="max-w-4xl mx-auto py-8 px-4">
        <div class="mb-8">
            <a href="user.html" class="text-primary hover:text-primary/80 flex items-center mb-4">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                </svg>
                Back to Dashboard
            </a>
            <div class="flex items-center space-x-3 mb-4">
                <div class="w-2 h-8 bg-gradient-to-b from-primary to-secondary rounded-full animate-pulse"></div>
                <h1 class="text-3xl font-bold bg-gradient-to-r from-primary via-secondary to-accent bg-clip-text text-transparent">Profile Settings</h1>
            </div>
            <p class="text-slate-600 dark:text-slate-300 mt-2 font-mono text-sm">// Manage your account information and preferences</p>
        </div>

        <div class="bg-white/90 dark:bg-slate-800/90 backdrop-blur-sm rounded-2xl shadow-2xl border border-primary/20 dark:border-primary/30">
            <div class="p-6 border-b border-primary/20 dark:border-primary/30 bg-gradient-to-r from-primary/5 to-secondary/5">
                <h2 class="text-xl font-semibold bg-gradient-to-r from-primary to-secondary bg-clip-text text-transparent">Personal Information</h2>
            </div>
            
            <form id="profileForm" class="p-6 space-y-6">
                <div class="flex items-center space-x-6">
                    <div class="w-20 h-20 bg-gradient-to-r from-primary to-secondary rounded-2xl flex items-center justify-center animate-glow">
                        <span id="profileInitials" class="text-white text-2xl font-semibold">JD</span>
                    </div>
                    <div>
                        <h3 class="text-lg font-medium text-gray-900 dark:text-white" id="profileName">John Doe</h3>
                        <p class="text-gray-600 dark:text-gray-300" id="profileEmail">john@example.com</p>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Full Name</label>
                        <input type="text" id="displayName" class="w-full px-4 py-3 border border-primary/30 dark:border-primary/40 rounded-xl focus:ring-2 focus:ring-primary/50 focus:border-primary dark:bg-slate-700 dark:text-white font-mono transition-all duration-300">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Email</label>
                        <input type="email" id="email" disabled class="w-full px-4 py-3 border border-primary/20 dark:border-primary/30 rounded-xl bg-slate-50 dark:bg-slate-600 text-slate-500 dark:text-slate-400 font-mono">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Phone</label>
                        <input type="tel" id="phone" class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary dark:bg-gray-700 dark:text-white">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Location</label>
                        <input type="text" id="location" class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary dark:bg-gray-700 dark:text-white">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Bio</label>
                    <textarea id="bio" rows="4" class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary dark:bg-gray-700 dark:text-white resize-none" placeholder="Tell us about yourself..."></textarea>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Skills</label>
                    <input type="text" id="skills" class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary dark:bg-gray-700 dark:text-white" placeholder="JavaScript, React, Node.js, Python...">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Education</label>
                        <input type="text" id="education" class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary dark:bg-gray-700 dark:text-white" placeholder="Bachelor's in Computer Science">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">College/University</label>
                        <input type="text" id="college" class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary dark:bg-gray-700 dark:text-white" placeholder="Stanford University">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">GitHub URL</label>
                        <input type="url" id="githubUrl" class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary dark:bg-gray-700 dark:text-white" placeholder="https://github.com/username">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">LinkedIn URL</label>
                        <input type="url" id="linkedinUrl" class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary dark:bg-gray-700 dark:text-white" placeholder="https://linkedin.com/in/username">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Membership</label>
                        <select id="membership" class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary dark:bg-gray-700 dark:text-white">
                            <option value="free">Free</option>
                            <option value="pro">Pro</option>
                        </select>
                    </div>
                </div>

                <div class="flex justify-end space-x-4 pt-6">
                    <button type="button" onclick="window.location.href='user.html'" class="px-6 py-3 text-gray-700 dark:text-gray-300 bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 hover:bg-gray-50 dark:hover:bg-gray-600 rounded-xl font-medium">
                        Cancel
                    </button>
                    <button type="submit" class="px-8 py-3 bg-gradient-to-r from-primary to-secondary hover:from-primary/90 hover:to-secondary/90 text-white rounded-xl font-semibold shadow-lg hover:shadow-primary/25 transition-all duration-300 animate-glow">
                        Save Changes
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getAuth, onAuthStateChanged, updateProfile } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        import { getFirestore, doc, setDoc, getDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyDUcG95XK9gg3PBKqYZVBYk5rarf-vExck",
            authDomain: "chayan2-platform.firebaseapp.com",
            projectId: "chayan2-platform",
            storageBucket: "chayan2-platform.firebasestorage.app",
            messagingSenderId: "694117760821",
            appId: "1:694117760821:web:68d2b2dee6fd158984567c",
            measurementId: "G-PB84HY01ED"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;

        // Load user profile
        async function loadUserProfile(user) {
            currentUser = user;
            
            // Update basic info
            document.getElementById('profileName').textContent = user.displayName || 'No Name';
            document.getElementById('profileEmail').textContent = user.email;
            document.getElementById('displayName').value = user.displayName || '';
            document.getElementById('email').value = user.email;
            
            // Update initials
            if (user.displayName) {
                const initials = user.displayName.split(' ').map(n => n[0]).join('').toUpperCase();
                document.getElementById('profileInitials').textContent = initials;
            }
            
            // Load additional profile data from Firestore
            try {
                const userDoc = await getDoc(doc(db, 'users', user.uid));
                if (userDoc.exists()) {
                    const userData = userDoc.data();
                    document.getElementById('phone').value = userData.phone || '';
                    document.getElementById('location').value = userData.location || '';
                    document.getElementById('bio').value = userData.bio || '';
                    document.getElementById('skills').value = userData.skills || '';
                    document.getElementById('education').value = userData.education || '';
                    document.getElementById('college').value = userData.college || '';
                    document.getElementById('githubUrl').value = userData.githubUrl || '';
                    document.getElementById('linkedinUrl').value = userData.linkedinUrl || '';
                    document.getElementById('membership').value = userData.membership || 'free';
                }
            } catch (error) {
                console.error('Error loading profile:', error);
            }
        }

        // Save profile
        async function saveProfile(e) {
            e.preventDefault();
            
            if (!currentUser) return;
            
            const submitBtn = e.target.querySelector('button[type="submit"]');
            const originalText = submitBtn.textContent;
            submitBtn.textContent = 'Saving...';
            submitBtn.disabled = true;
            
            try {
                const displayName = document.getElementById('displayName').value;
                const phone = document.getElementById('phone').value;
                const location = document.getElementById('location').value;
                const bio = document.getElementById('bio').value;
                const skills = document.getElementById('skills').value;
                const education = document.getElementById('education').value;
                const college = document.getElementById('college').value;
                const githubUrl = document.getElementById('githubUrl').value;
                const linkedinUrl = document.getElementById('linkedinUrl').value;
                const membership = document.getElementById('membership').value;
                
                // Update Firebase Auth profile
                await updateProfile(currentUser, { displayName });
                
                // Save additional data to Firestore
                await setDoc(doc(db, 'users', currentUser.uid), {
                    displayName,
                    email: currentUser.email,
                    phone,
                    location,
                    bio,
                    skills,
                    education,
                    college,
                    githubUrl,
                    linkedinUrl,
                    membership,
                    updatedAt: new Date()
                }, { merge: true });
                
                // Update UI
                document.getElementById('profileName').textContent = displayName;
                if (displayName) {
                    const initials = displayName.split(' ').map(n => n[0]).join('').toUpperCase();
                    document.getElementById('profileInitials').textContent = initials;
                }
                
                submitBtn.textContent = '✓ Saved!';
                setTimeout(() => {
                    submitBtn.textContent = originalText;
                    submitBtn.disabled = false;
                }, 2000);
                
            } catch (error) {
                console.error('Error saving profile:', error);
                submitBtn.textContent = 'Error - Try Again';
                setTimeout(() => {
                    submitBtn.textContent = originalText;
                    submitBtn.disabled = false;
                }, 2000);
            }
        }

        // Auth state listener
        onAuthStateChanged(auth, (user) => {
            if (user) {
                loadUserProfile(user);
            } else {
                window.location.href = 'index.html';
            }
        });

        // Form submission
        document.getElementById('profileForm').addEventListener('submit', saveProfile);
    </script>
</body>
</html>
